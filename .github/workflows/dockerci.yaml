name: Docker CI pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sonarqube:
    runs-on: [self-hosted, wsl-karthi]

    steps:
      - name: Clone code
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -f Dockerfile.multistage.secured -t dockerfile .

      - name: Tag Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker tag dockerfile ${{ vars.DOCKERHUB_USERNAME }}/nodeapp4:$SHORT_SHA

      - name: Push Image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/nodeapp4:$SHORT_SHA
