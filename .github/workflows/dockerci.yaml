name: Docker CI pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  dockerci:
    runs-on: [self-hosted, wsl-karthi]

    steps:
      - name: Clone code
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -f Dockerfile.multistage.secured -t dockerfile .

      - name: Tag Docker image
        id: tag
        run: |
           echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
           docker tag dockerfile ${{ vars.DOCKERHUB_USERNAME }}/nodeapp4:${GITHUB_SHA::7}

      - name: Push Image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/nodeapp4:${{ steps.tag.outputs.sha }}
