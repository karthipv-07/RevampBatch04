name: Docker Build and Push

inputs:
  username:
    description: DockerHub username
    required: true
  password:
    description: DockerHub password
    required: true

 runs:
   using: "composite"
   steps:
     - name: Login to Docker Hub
       uses: docker/login-action@v4
       with:
         username: ${{ inputs.username }}
         password: ${{ inputs.password }}

     - name: Build Docker image
       run: docker build -f Dockerfile.multistage.secured -t dockerfile .

     - name: Tag Docker image
       id: tag
       run: |
         echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
         docker tag dockerfile ${{ vars.DOCKERHUB_USERNAME }}/nodeapp4:${GITHUB_SHA::7}

     - name: Push Image
       run: |
         docker push ${{ vars.DOCKERHUB_USERNAME }}/nodeapp4:${{ steps.tag.outputs.sha }}
