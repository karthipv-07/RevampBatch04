name: Docker Build and Push

inputs:
  username:
    description: DockerHub username
    required: true
  password:
    description: DockerHub password
    required: true
    
runs:
  using: "composite"
  steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build Docker image
      shell: bash
      run: docker build -f Dockerfile.multistage.secured -t dockerfile .

    - name: Tag Docker image
      id: tag
      shell: bash
      run: |
        echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        docker tag dockerfile ${{ inputs.username }}/nodeapp4:${GITHUB_SHA::7}

    - name: Push Image
      shell: bash
      run: |
        docker push ${{ inputs.username }}/nodeapp4:${{ steps.tag.outputs.sha }}
